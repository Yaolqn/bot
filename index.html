<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Many Bricks Breaker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="top-bar">
            <div class="controls">
                <div class="control-info">
                    <p>使用鼠标或触摸移动挡板</p>
                    <p>空格键暂停/继续</p>
                </div>
                <div class="sensitivity-control">
                    <label for="sensitivitySlider">挡板灵敏度: <span id="sensitivityValue">1.0</span></label>
                    <input type="range" id="sensitivitySlider" min="0.3" max="2" step="0.1" value="1">
                </div>
            </div>
            <div class="score-container">
                <span>得分: <span id="score">0</span></span>
                <span>等级: <span id="level">1</span></span>
            </div>
        </div>
        
        <div class="game-area">
            <canvas id="gameCanvas"></canvas>
            <div class="game-overlay" id="gameOverlay">
                <div class="overlay-content">
                    <h2 id="overlayTitle">准备开始</h2>
                    <p id="overlayMessage">点击开始游戏</p>
                    <button id="startBtn" class="game-btn">开始游戏</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
